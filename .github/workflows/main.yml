name: Build Flet APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
    - name: Build APK
      run: |
        flet build apk --target app_movil.py
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-release
        path: build/apk/*.apk
